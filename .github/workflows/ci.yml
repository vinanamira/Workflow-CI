name: CI - MLflow Project

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: vinanamira/cancer-model    # <dockerhub_username>/<image>

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          pip install "mlflow==2.19.0" "scikit-learn>=1.3,<1.7" "pandas>=2.0" numpy

      - name: Run MLflow Project (re-training)
        working-directory: MLProject
        run: |
          mlflow run . --env-manager local

      - name: Get latest MLflow run_id
        id: run
        working-directory: MLProject
        run: |
          RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs(order_by=['start_time DESC']).iloc[0].run_id)")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Latest run_id: $RUN_ID"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: MLProject/mlruns/**/artifacts/model/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with mlflow build-docker
        working-directory: MLProject
        run: |
          # --env-manager local => install deps langsung via pip di base image
          # (hindari virtualenv/pyenv yang meng-compile Python & sering gagal di CI)
          mlflow models build-docker \
            -m "runs:/${{ steps.run.outputs.run_id }}/model" \
            -n "$IMAGE_NAME" \
            --env-manager local

      - name: Tag and push image to Docker Hub
        run: |
          docker tag "$IMAGE_NAME" "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:latest"
